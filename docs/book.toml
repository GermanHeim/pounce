[book]
title = "POUNCE"
description = "A pure-Rust port of the Ipopt interior-point nonlinear programming solver"
authors = ["John Kitchin"]
language = "en"
src = "src"

[output.html]
# trf.md and dae.md write math with mdBook's escaped delimiters (`\\(...\\)`,
# `\\[...\\]`). mdBook emits those as MathJax delimiters but only injects the
# MathJax script when this is set, so without it the equations render as raw
# `\(f, h, g\)` text.
mathjax-support = true
default-theme = "navy"
preferred-dark-theme = "navy"
additional-css = ["assets/pounce.css"]
additional-js = ["assets/pounce.js"]
git-repository-url = "https://github.com/jkitchin/pounce"
# {path} already includes the book's `src/` prefix (e.g. src/introduction.md),
# so the template points at docs/, not docs/src/, to avoid a doubled src/src/.
edit-url-template = "https://github.com/jkitchin/pounce/edit/main/docs/{path}"
