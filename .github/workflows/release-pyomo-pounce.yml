# Build and publish `pyomo-pounce` to PyPI.
#
# The wheel bundles the pounce CLI binary inside the package
# (pyomo_pounce/bin/), so each platform needs its own wheel. A separate
# sdist is published with no binary; that path relies on the user
# having `pounce` on PATH.
#
# Triggers:
#   - push of a tag `pyomo-pounce-v*` -> build + publish to PyPI
#   - workflow_dispatch with target=testpypi -> dry-run publish
#   - workflow_dispatch with target=none -> just build artifacts
name: release-pyomo-pounce

on:
  push:
    tags: ["pyomo-pounce-v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to upload (pypi, testpypi, none)"
        required: true
        default: "none"
        type: choice
        options: [pypi, testpypi, none]

permissions:
  contents: read

jobs:
  build-wheels:
    name: wheel (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            wheel_tag: manylinux2014_x86_64
            rust_target: x86_64-unknown-linux-gnu
            binary_name: pounce
          - os: macos-13
            arch: x86_64
            wheel_tag: macosx_10_12_x86_64
            rust_target: x86_64-apple-darwin
            binary_name: pounce
          - os: macos-14
            arch: arm64
            wheel_tag: macosx_11_0_arm64
            rust_target: aarch64-apple-darwin
            binary_name: pounce
          - os: windows-latest
            arch: x86_64
            wheel_tag: win_amd64
            rust_target: x86_64-pc-windows-msvc
            binary_name: pounce.exe
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pyomo-pounce-${{ matrix.rust_target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build wheel

      - name: Build pounce CLI binary
        run: cargo build --release --bin pounce --target ${{ matrix.rust_target }}

      - name: Stage binary inside the package
        shell: bash
        run: |
          mkdir -p pyomo-pounce/pyomo_pounce/bin
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" \
             "pyomo-pounce/pyomo_pounce/bin/${{ matrix.binary_name }}"
          ls -l pyomo-pounce/pyomo_pounce/bin/

      - name: Build wheel
        working-directory: pyomo-pounce
        run: python -m build --wheel

      # The wheel comes out tagged `py3-none-any` because setup.py only
      # asserts ext_modules, not a real Python tag. Re-tag it as
      # platform-specific so PyPI accepts per-platform binary wheels
      # under the same version. `wheel tags` rewrites the filename and
      # WHEEL metadata in place.
      - name: Re-tag wheel as platform-specific
        working-directory: pyomo-pounce
        shell: bash
        run: |
          python -m pip install wheel
          orig=$(ls dist/pyomo_pounce-*-py3-none-any.whl)
          python -m wheel tags \
            --platform-tag ${{ matrix.wheel_tag }} \
            --remove "$orig"
          ls -l dist/

      - uses: actions/upload-artifact@v4
        with:
          name: pyomo-pounce-wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: pyomo-pounce/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: sdist (no binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build
      - name: Build sdist
        working-directory: pyomo-pounce
        run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: pyomo-pounce-sdist
          path: pyomo-pounce/dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/pyomo-pounce-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyomo-pounce/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: publish to TestPyPI
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyomo-pounce/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
